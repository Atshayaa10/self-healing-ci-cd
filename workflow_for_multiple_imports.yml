name: Test Multiple Imports

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-multiple-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Run test_multiple_imports.py
        run: python test_multiple_imports.py
